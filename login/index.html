<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="login-container">
    <div class="login-card">
      <h1>Iniciar sesión</h1>
      <form id="loginForm">
        <label for="username">Usuario</label>
        <input id="username" name="username" type="text" autocomplete="username" placeholder="Ingrese su usuario" required />

        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Ingrese su contraseña" required />

        <button type="submit">Entrar</button>
        <p id="errorMessage" class="error-message" aria-live="polite"></p>
      </form>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
